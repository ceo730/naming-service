function decompose(ch) {
  const code = ch.charCodeAt(0) - 0xAC00;
  if (code < 0 || code > 11171) return null;
  return [CHOSUNG[Math.floor(code/(21*28))], JUNGSUNG[Math.floor((code%(21*28))/28)], JONGSUNG_ARR[code%28]];
}
function getVowelType(v) { if (YANG_VOWELS.has(v)) return '양'; if (EUM_VOWELS.has(v)) return '음'; return '중'; }
function getChosungOhaeng(ch) { const d = decompose(ch); return d ? (CHOSUNG_OHAENG[d[0]]||'土') : '土'; }
const COMPOUND_JONGSUNG_FIRST = {'ㄳ':'ㄱ','ㄵ':'ㄴ','ㄶ':'ㄴ','ㄺ':'ㄹ','ㄻ':'ㄹ','ㄼ':'ㄹ','ㄽ':'ㄹ','ㄾ':'ㄹ','ㄿ':'ㄹ','ㅀ':'ㄹ','ㅄ':'ㅂ'};
function getJongsungOhaeng(ch) {
  const d = decompose(ch); if (!d || !d[2]) return null;
  const j = d[2];
  if (CHOSUNG_OHAENG[j]) return CHOSUNG_OHAENG[j];
  const f = COMPOUND_JONGSUNG_FIRST[j]; return f ? (CHOSUNG_OHAENG[f]||'土') : '土';
}
function evaluatePhonetics(surname, nameChars) {
  const full = surname + nameChars.join('');
  const dec = [...full].map(decompose).filter(Boolean);
  if (!dec.length) return [50, '분석 불가'];
  let score = 70; const details = [];
  const vt = dec.map(d => getVowelType(d[1]));
  const yc = vt.filter(v=>v==='양').length, ec = vt.filter(v=>v==='음').length;
  if (yc>0 && ec>0 && Math.abs(yc-ec)<=1) { score+=10; details.push('음양 모음 조화 우수'); }
  else if ((yc>0&&ec===0)||(ec>0&&yc===0)) { score+=5; details.push('모음 통일감'); }
  const chos = dec.map(d=>d[0]);
  if (new Set(chos).size === chos.length) { score+=10; details.push('초성 모두 다름'); }
  if (chos.length>1 && chos[0]===chos[1]) { score-=10; details.push('성-이름 초성 동일'); }
  for (let i=0;i<dec.length-1;i++) {
    if (dec[i][2] && dec[i+1][0]==='ㅇ') score+=3;
    else if (dec[i][2] && dec[i][2]===dec[i+1][0]) score-=5;
  }
  const jongs = dec.map(d=>!!d[2]);
  if (jongs.length>=3) {
    if ((jongs[0]&&!jongs[1]&&jongs[2])||(!jongs[0]&&jongs[1]&&!jongs[2])) score+=5;
    if (jongs[0]&&jongs[1]&&jongs[2]) score-=5;
  }
  return [Math.max(0,Math.min(100,score)), details.join('; ')||'표준적 발음'];
}
function _evalOhaengChain(ohaengs) {
  let score = 60; const details = []; const ps = [];
  for (let i=0;i<ohaengs.length-1;i++) {
    const a=ohaengs[i], b=ohaengs[i+1], pair=a+b, rev=b+a;
    if (OHAENG_SANGSAENG_SET.has(pair)&&!OHAENG_SANGSAENG_SET.has(rev)) { ps.push(20); details.push(a+'→'+b+' 상생'); }
    else if (OHAENG_SANGSAENG_SET.has(rev)&&!OHAENG_SANGSAENG_SET.has(pair)) { ps.push(10); details.push(a+'→'+b+' 역생'); }
    else if (a===b) { ps.push(5); details.push(a+'='+b+' 비화'); }
    else if (OHAENG_SANGGEUK_SET.has(pair)) { ps.push(-20); details.push(a+'↔'+b+' 상극'); }
    else ps.push(0);
  }
  score += ps.reduce((a,b)=>a+b,0);
  if (ps.length>=2 && ps.every(p=>p===20)) { score+=10; details.push('완벽 상생 흐름'); }
  return [Math.max(0,Math.min(100,score)), details];
}
function evaluateEumryeongOhaeng(surname, nameChars) {
  const nameOhs = nameChars.map(getChosungOhaeng);
  const choOh = getChosungOhaeng(surname);
  const choChain = [choOh, ...nameOhs];
  const [choScore, choDetails] = _evalOhaengChain(choChain);
  const jongOh = getJongsungOhaeng(surname);
  if (jongOh && jongOh !== choOh) {
    const jongChain = [jongOh, ...nameOhs];
    const [jongScore, jongDetails] = _evalOhaengChain(jongChain);
    if (jongScore > choScore) {
      const flow = jongChain.join('→');
      return [jongScore, flow+' (종성경로: '+jongDetails.join('; ')+')', flow];
    }
  }
  const flow = choChain.join('→');
  return [choScore, flow+(choDetails.length?' ('+choDetails.join('; ')+')':''), flow];
}

// Global data (loaded async)
let HANJA_DB = [];
let BULYONG_SET = new Set();
let HANGUL_INDEX = new Map(); // Map<hangul, hanja[]>

function buildHangulIndex() {
  HANGUL_INDEX = new Map();
  HANJA_DB.forEach(entry => {
    const readings = entry.g.split(',').map(r => r.trim());
    readings.forEach(r => {
      if (!HANGUL_INDEX.has(r)) HANGUL_INDEX.set(r, []);
      HANGUL_INDEX.get(r).push(entry);
    });
  });
}

function findHanjaForReading(readingKr, ohaengList, minStrokes, maxStrokes) {
  minStrokes = minStrokes || 3; maxStrokes = maxStrokes || 20;
  let pool = HANGUL_INDEX.get(readingKr) || [];
  const candidates = [];
  pool.forEach(entry => {
    if (BULYONG_SET.has(entry.h)) return;
    if (entry.s < minStrokes || entry.s > maxStrokes) return;
    if (!entry.m || entry.m === '') return;
    if (ohaengList && ohaengList.length > 0 && !ohaengList.includes(entry.o)) return;
    if (NEGATIVE_MEANINGS.some(neg => entry.m.includes(neg))) return;
    let score = 30;
    const wk = WELL_KNOWN_HANJA[readingKr] || [];
    if (wk.includes(entry.h)) score += 50;
    const posCount = POSITIVE_MEANINGS.filter(kw => entry.m.includes(kw)).length;
    score += Math.min(posCount * 12, 30);
    if (entry.s >= 6 && entry.s <= 14) score += 10;
    else if ((entry.s >= 4 && entry.s <= 5) || (entry.s >= 15 && entry.s <= 16)) score += 5;
    else if (entry.s > 20) score -= 10;
    if (entry.m.length >= 4) score += 5;
    let multiWarn = null;
    if (MULTI_READING_HANJA[entry.h]) multiWarn = entry.h + '은(는) 다음자로 ' + MULTI_READING_HANJA[entry.h].join('/') + '로 읽힐 수 있습니다';
    candidates.push({
      hanja: entry.h, hangul: readingKr, meaning: entry.m, strokes: entry.s,
      ohaeng: entry.o, jawon_ohaeng: entry.j || entry.o,
      score: Math.max(1, score), multi_reading_warning: multiWarn
    });
  });
  candidates.sort((a,b) => b.score - a.score);
  return candidates;
}

const _hanjaCache = new Map();
function getBestHanja(readingKr, ohaengList) {
  const key = readingKr + '|' + (ohaengList||[]).join(',');
  if (!_hanjaCache.has(key)) _hanjaCache.set(key, findHanjaForReading(readingKr, ohaengList));
  return _hanjaCache.get(key);
}

function sortPatternsByEumryeong(patterns, surname) {
  const surChoOh = getChosungOhaeng(surname);
  const surJongOh = getJongsungOhaeng(surname);
  function pairScore(a, b) {
    const p = a+b, r = b+a;
    if (OHAENG_SANGSAENG_SET.has(p)) return 20;
    if (OHAENG_SANGSAENG_SET.has(r)) return 10;
    if (a===b) return 5;
    if (OHAENG_SANGGEUK_SET.has(p)) return -20;
    return 0;
  }
  function patScore(pat) {
    const r1Oh = getChosungOhaeng(pat[0]), r2Oh = getChosungOhaeng(pat[1]);
    let cs = pairScore(surChoOh, r1Oh) + pairScore(r1Oh, r2Oh);
    if (surJongOh && surJongOh !== surChoOh) {
      const js = pairScore(surJongOh, r1Oh) + pairScore(r1Oh, r2Oh);
      return Math.max(cs, js);
    }
    return cs;
  }
  const scored = patterns.map(p => [p, patScore(p)]);
  // shuffle within same score
  for (let i = scored.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [scored[i], scored[j]] = [scored[j], scored[i]];
  }
  scored.sort((a,b) => b[1] - a[1]);
  return scored.map(s => s[0]);
}

function _buildCandidate(surname, chars, suri, phScore, phDetail, total,
  eumryeongScore, eumryeongDetail, eumryeongFlow,
  jawonScore, jawonDetail, jawonFlow, chungWarnings, hyeongWarnings, eyPattern) {
  const hangulName = surname + chars.map(c=>c.hangul).join('');
  const multiWarnings = chars.map(c=>c.multi_reading_warning).filter(Boolean);
  return {
    hangul: hangulName, hanja: chars.map(c=>c.hanja).join(' '), hanja_full: hangulName,
    chars, suri, phonetic_score: phScore, phonetic_detail: phDetail, total_score: total,
    ohaeng_composition: chars.map(c=>c.ohaeng).join('+'),
    eumryeong_score: eumryeongScore||0, eumryeong_detail: eumryeongDetail||'',
    eumryeong_flow: eumryeongFlow||'', jawon_score: jawonScore||0,
    jawon_detail: jawonDetail||'', jawon_flow: jawonFlow||'',
    chung_warnings: chungWarnings||[], hyeong_warnings: hyeongWarnings||[],
    eumyang_strokes: eyPattern||[], multi_reading_warnings: multiWarnings
  };
}

function _selectDiverse(candidates, count) {
  const selected = [];
  const usedNames = new Set(), usedR1 = new Set(), usedR2 = new Set(), usedSets = [];
  function charsOverlap(chars) {
    const cs = new Set(chars.map(c=>c.hangul));
    return usedSets.some(ps => cs.size===ps.size && [...cs].every(c=>ps.has(c)));
  }
  // Pass 1
  for (const c of candidates) {
    if (selected.length >= count) break;
    const r1=c.chars[0].hangul, r2=c.chars.length>1?c.chars[1].hangul:'';
    if (usedNames.has(c.hangul)||usedR1.has(r1)||(r2&&usedR2.has(r2))||charsOverlap(c.chars)) continue;
    selected.push(c); usedNames.add(c.hangul); usedR1.add(r1);
    if (r2) usedR2.add(r2); usedSets.push(new Set(c.chars.map(x=>x.hangul)));
  }
  // Pass 2
  if (selected.length < count) {
    for (const c of candidates) {
      if (selected.length >= count) break;
      const r2=c.chars.length>1?c.chars[1].hangul:'';
      if (usedNames.has(c.hangul)||(r2&&usedR2.has(r2))||charsOverlap(c.chars)) continue;
      selected.push(c); usedNames.add(c.hangul);
      if (r2) usedR2.add(r2); usedSets.push(new Set(c.chars.map(x=>x.hangul)));
    }
  }
  // Pass 3
  if (selected.length < count) {
    for (const c of candidates) {
      if (selected.length >= count) break;
      if (!usedNames.has(c.hangul)) { selected.push(c); usedNames.add(c.hangul); }
    }
  }
  return selected;
}

function generateNames(surname, gender, sajuResult, preferences, count) {
  count = count || 3;
  preferences = preferences || {};
  _hanjaCache.clear();
  const oa = sajuResult.ohaeng_analysis;
  const needed = oa.yongsin.needed_ohaeng;
  const surnameStrokes = getSurnameStrokes(surname);
  const birthYear = preferences.birth_year || 2024;
  const requestType = preferences.request_type || '신생아 작명';
  const nameLength = parseInt(preferences.name_length || 2);
  const patterns = getNamePatterns(gender, birthYear, requestType);
  let ohaengCombos;
  if (needed.length >= 2) {
    ohaengCombos = [
      [[needed[0]], [needed[1]], true], [[needed[1]], [needed[0]], true],
      [[needed[0]], [needed[0]], true], [needed.slice(0,2), needed.slice(0,2), true],
      [[needed[0]], null, false], [null, [needed[0]], false], [null, null, false]
    ];
  } else if (needed.length === 1) {
    ohaengCombos = [
      [[needed[0]], [needed[0]], true], [[needed[0]], null, false],
      [null, [needed[0]], false], [null, null, false]
    ];
  } else {
    ohaengCombos = [[null, null, false]];
  }
  const dayBranch = (sajuResult.day_pillar||{}).branch || '';
  const nameCandidates = [];
  const sortedPatterns = sortPatternsByEumryeong(patterns, surname);

  for (const [r1, r2raw] of sortedPatterns) {
    const r2 = nameLength === 1 ? null : r2raw;
    for (const combo of ohaengCombos) {
      const [oh1, oh2, isStrict] = combo;
      const h1List = oh1 ? getBestHanja(r1, oh1) : findHanjaForReading(r1);
      if (!h1List.length) continue;
      if (nameLength === 1) {
        for (const h1 of h1List.slice(0,5)) {
          const suri = calculateSuriOhaeng(surnameStrokes, h1.strokes);
          if (suri.total_score < 50) continue;
          const [phS, phD] = evaluatePhonetics(surname, [h1.hangul]);
          const [erS, erD, erF] = evaluateEumryeongOhaeng(surname, [h1.hangul]);
          const ohBonus = (oh1 && oh1.includes(h1.ohaeng)) ? 8 : 0;
          const cw = checkChungConflict(dayBranch, [h1.hanja]);
          const hw = checkHyeongConflict(dayBranch, [h1.hanja]);
          const [eyB, eyP] = evaluateEumyangStrokes(surnameStrokes, [h1]);
          const total = h1.score*0.3 + suri.total_score*0.25 + phS*0.20 + erS*0.25 + ohBonus - 15*cw.length - 10*hw.length + eyB;
          nameCandidates.push(_buildCandidate(surname,[h1],suri,phS,phD,total,erS,erD,erF,0,'','',cw,hw,eyP));
        }
        continue;
      }
      const h2List = oh2 ? getBestHanja(r2, oh2) : findHanjaForReading(r2);
      if (!h2List.length) continue;
      for (const h1 of h1List.slice(0,5)) {
        for (const h2 of h2List.slice(0,5)) {
          if (h1.hanja === h2.hanja) continue;
          const suri = calculateSuriOhaeng(surnameStrokes, h1.strokes, h2.strokes);
          if (suri.total_score < 50) continue;
          const [phS, phD] = evaluatePhonetics(surname, [h1.hangul, h2.hangul]);
          if (phS < 60) continue;
          const [erS, erD, erF] = evaluateEumryeongOhaeng(surname, [h1.hangul, h2.hangul]);
          const [jwS, jwD, jwF] = evaluateJawonOhaengFlow(surname, [h1, h2]);
          const cw = checkChungConflict(dayBranch, [h1.hanja, h2.hanja]);
          const hw = checkHyeongConflict(dayBranch, [h1.hanja, h2.hanja]);
          const [eyB, eyP] = evaluateEumyangStrokes(surnameStrokes, [h1, h2]);
          let ohBonus = 0;
          if (needed.length) { if (needed.includes(h1.ohaeng)) ohBonus+=5; if (needed.includes(h2.ohaeng)) ohBonus+=5; }
          const total = h1.score*0.15 + h2.score*0.15 + suri.total_score*0.20 + phS*0.15 + erS*0.20 + jwS*0.10 + ohBonus - 15*cw.length - 10*hw.length + eyB;
          nameCandidates.push(_buildCandidate(surname,[h1,h2],suri,phS,phD,total,erS,erD,erF,jwS,jwD,jwF,cw,hw,eyP));
        }
      }
    }
  }
  nameCandidates.sort((a,b) => b.total_score - a.total_score);
  const selected = _selectDiverse(nameCandidates, count);
  selected.forEach((name, i) => {
    name.rank = i + 1;
    const full = surname + name.chars.map(c=>c.hangul).join('');
    name.eumyang = [...full].map(ch => { const d = decompose(ch); return d ? getVowelType(d[1]) : '중'; });
    name.meaning_summary = name.chars.map(c => c.hanja+'('+c.hangul+'): '+c.meaning).join(' / ');
  });
  return selected;
}

function getCallDesignation(formData) {
  const birthDate = formData.birth_date || '';
  const requestType = formData.request_type || '신생아 작명';
  const currentName = formData.current_name || '';
  const surname = formData.surname || '';
  if (birthDate) {
    try {
      const birthYear = parseInt(birthDate.split('-')[0]);
      const age = new Date().getFullYear() - birthYear;
      if (age < 10) return '우리 아이';
      if (currentName) return currentName + '님';
      return surname + '씨';
    } catch(e) {}
  }
  if (requestType.includes('개명') && currentName) return currentName + '님';
  return '우리 아이';

async function callGPT(apiKey, systemPrompt, userPrompt, maxTokens) {
  const resp = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({
      model: 'gpt-4o', temperature: 0.7, max_tokens: maxTokens || 6000,
      messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }]
    })
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error('OpenAI API 오류: ' + resp.status + ' - ' + err);
  }
  const data = await resp.json();
  return data.choices[0].message.content;
}

둘째: 사주팔자 핵심 진단 (일간 특성, 각 주의 의미, 타고난 기질)

번호 목록, bullet point는 절대 사용하지 마십시오.`;

  const intro = await callGPT(apiKey, REPORT_SYSTEM_PROMPT, introPrompt, 6000);
  report.sections.push({ title: '사주 분석 및 작명 방향', content: intro, type: 'intro' });
  onProgress && onProgress(25, '도입부 완료');

  let allNamesCtx = '';
  for (let i = 0; i < names.length; i++) {

${sajuContext}

${nameCtx}

【호칭 규칙】 '${callDesig}'라고만 지칭하십시오.

이름의 첫인상, 발음 특성, 한자의 뜻과 역사적 용례, 사주 보완 효과(용신/희신), 음령 오행 흐름, 자원 오행 흐름, 성격/사회적 이미지, 생애주기별 적합성을 모두 다루십시오. 4000자 이상. 각 주제마다 **소제목**을 달고 줄글로 쓰십시오. 번호 목록, bullet point 금지.`;

    const analysis = await callGPT(apiKey, REPORT_SYSTEM_PROMPT, namePrompt, 8000);
    report.sections.push({
      title: `후보 이름 ${i+1}: ${names[i].hangul}`, content: analysis, type: 'name_analysis',
      name_info: {
        hangul: names[i].hangul, hanja: names[i].chars.map(c=>c.hanja).join(' '),
        ohaeng: names[i].ohaeng_composition, eumyang: (names[i].eumyang||[]).join(' '),
        eumryeong_flow: names[i].eumryeong_flow, jawon_flow: names[i].jawon_flow
      }
    });
    onProgress && onProgress(25 + (i+1)*20, `이름 ${i+1} 분석 완료`);
  }

  onProgress && onProgress(90, '최종 비교 분석 작성 중...');
  const compPrompt = `다음 사주 정보와 3개 후보 이름을 바탕으로 최종 비교 분석을 작성하세요.

${sajuContext}

${allNamesCtx}

【호칭 규칙】 '${callDesig}'라고만 지칭하십시오.

세 이름의 수리오행, 음령 오행, 자원 오행, 발음, 한자 의미를 종합 비교하고, 사주 보완력, 품격과 인상을 비교하십시오. 최종 추천 이름을 명확히 밝히고 이유를 설득력 있게 쓰십시오. 3000자 이상. **소제목** 형식 필수. 번호 목록 금지.`;

  const comparison = await callGPT(apiKey, REPORT_SYSTEM_PROMPT, compPrompt, 6000);
  report.sections.push({ title: '최종 추천 및 선택 가이드', content: comparison, type: 'comparison' });
  onProgress && onProgress(100, '보고서 생성 완료!');
  return report;
}

const PW = 210, PH = 297;
const BODY_LEFT = 30, BODY_RIGHT = 30, BODY_TOP = 22, BODY_BOTTOM = 35;
const BODY_W = PW - BODY_LEFT - BODY_RIGHT;
const C_BODY = [50,50,50], C_TITLE = [70,50,35], C_SUBTITLE = [110,90,70], C_HEADER = [140,130,120];
const C_OHAENG_PDF = { '木':[76,153,76], '火':[204,85,85], '土':[170,145,80], '金':[130,130,160], '水':[70,130,180] };

let _fontLoaded = false;
let _fontRegularB64 = null, _fontBoldB64 = null;

async function loadFonts() {
  if (_fontLoaded) return;
  async function fetchB64(url) {
    const resp = await fetch(url);
    const buf = await resp.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let binary = '';
    const chunk = 8192;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    return btoa(binary);
  }
  _fontRegularB64 = await fetchB64('fonts/NanumGothic-Regular.ttf');
  _fontBoldB64 = await fetchB64('fonts/NanumGothic-Bold.ttf');
  _fontLoaded = true;
}

async function generatePDF(sajuResult, names, report, formData) {
  await loadFonts();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  doc.addFileToVFS('NanumGothic-Regular.ttf', _fontRegularB64);
  doc.addFont('NanumGothic-Regular.ttf', 'NanumGothic', 'normal');
  doc.addFileToVFS('NanumGothic-Bold.ttf', _fontBoldB64);
  doc.addFont('NanumGothic-Bold.ttf', 'NanumGothic', 'bold');

  function addBgPage(imgKey) { doc.addPage(); doc.addImage(ASSETS_B64[imgKey], 'JPEG', 0, 0, PW, PH); }
  function addBodyPage() { doc.addPage(); doc.addImage(ASSETS_B64['naeji'], 'JPEG', 0, 0, PW, PH); return BODY_TOP; }

  // Cover
  doc.addImage(ASSETS_B64['front_cover'], 'JPEG', 0, 0, PW, PH);
  // TOC
  addBgPage('toc');
  // Static pages
  for (let i = 1; i <= 9; i++) addBgPage('page' + i);

  // Helper: write prose with auto page break
  function writeProse(text) {
    if (!text) return;
    const FONT_SIZE = 10, LINE_H = 6, PARA_GAP = 8, SUB_GAP = 10, SUB_AFTER = 4;
    text = text.replace(/^#{1,6}\s+/gm, '').replace(/^[\-\*\•]\s+/gm, '').replace(/^\d+[\.\)]\s+/gm, '')
      .replace(/```[\s\S]*?```/g, '').replace(/---+/g, '');
    const rawParas = text.split(/\n\s*\n/);
    const blocks = [];
    for (let i = 0; i < rawParas.length; i++) {
      let para = rawParas[i].trim();
      if (!para || para.length < 3) continue;
      const m = para.match(/^\*\*(.+?)\*\*\s*([\s\S]*)/);
      if (m) {
        const sub = m[1].trim();
        let body = m[2].trim().replace(/\n/g, ' ').replace(/\s+/g, ' ').replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1');
        if (!body && i+1 < rawParas.length) {
          body = rawParas[i+1].trim().replace(/\n/g, ' ').replace(/\s+/g, ' ').replace(/\*\*(.*?)\*\*/g, '$1');
          i++;
        }
        blocks.push([sub, body]);
      } else {
        let body = para.replace(/\n/g, ' ').replace(/\s+/g, ' ').replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1');
        if (body.length >= 5) blocks.push(['', body]);
      }
    }
    let y = addBodyPage();
    let paraOnPage = 0;
    blocks.forEach(([sub, body]) => {
      if (paraOnPage >= 2) { y = addBodyPage(); paraOnPage = 0; }
      if (sub) {
        if (paraOnPage > 0) y += SUB_GAP;
        if (y > PH - BODY_BOTTOM - 20) { y = addBodyPage(); paraOnPage = 0; }
        doc.setFont('NanumGothic', 'bold'); doc.setFontSize(FONT_SIZE + 1); doc.setTextColor(...C_TITLE);
        const subLines = doc.splitTextToSize(sub, BODY_W);
        subLines.forEach(sl => { doc.text(sl, BODY_LEFT, y); y += LINE_H; });
        y += SUB_AFTER;
      }
      if (body) {
        doc.setFont('NanumGothic', 'normal'); doc.setFontSize(FONT_SIZE); doc.setTextColor(...C_BODY);
        const lines = doc.splitTextToSize('   ' + body, BODY_W);
        lines.forEach(line => {
          if (y > PH - BODY_BOTTOM) { y = addBodyPage() + 10; paraOnPage = 0; }
          doc.text(line, BODY_LEFT, y); y += LINE_H;
        });
        y += PARA_GAP;
      }
      paraOnPage++;
    });
  }

  // Saju info page
  function addSajuInfo() {
    let y = addBodyPage() + 8;
    doc.setFont('NanumGothic', 'bold'); doc.setFontSize(16); doc.setTextColor(...C_TITLE);
    doc.text('사주팔자 구성', PW/2, y, { align: 'center' }); y += 18;
    doc.setDrawColor(180,160,130); doc.setLineWidth(0.4); doc.line(70, y, 140, y); y += 10;
    // Basic info
    const info = [['성씨', formData.surname||''],['성별', formData.gender||''],['생년월일', (formData.birth_date||'')+' (양력)'],['출생시간', formData.birth_time||'미상']];
    info.forEach(([label, value]) => {
      doc.setFont('NanumGothic', 'normal'); doc.setFontSize(10); doc.setTextColor(...C_SUBTITLE);
      doc.text(label, 85, y, { align: 'right' });
      doc.setFont('NanumGothic', 'bold'); doc.setTextColor(...C_BODY);
      doc.text(value, 93, y); y += 8;
    });
    y += 10;
    // Saju table
    const pLabels = ['시주','일주','월주','년주'];
    const pKeys = ['hour_pillar','day_pillar','month_pillar','year_pillar'];
    const tX = 40, colW = 32.5, rowH = 16;
    doc.setFillColor(100,75,55); doc.setTextColor(255,255,255);
    doc.setFont('NanumGothic', 'bold'); doc.setFontSize(10);
    pLabels.forEach((l,i) => { doc.rect(tX+i*colW, y, colW, 10, 'F'); doc.text(l, tX+i*colW+colW/2, y+7, {align:'center'}); });
    y += 10;
    doc.setFillColor(248,244,238);
    // Stems
    pKeys.forEach((k,i) => {
      const p = sajuResult[k];
      doc.rect(tX+i*colW, y, colW, rowH, 'FD');
      doc.setFont('NanumGothic','bold'); doc.setFontSize(12);
      if (p) { doc.setTextColor(...(C_OHAENG_PDF[p.stem_ohaeng]||C_BODY)); doc.text(p.stem+'('+p.stem_kr+')', tX+i*colW+colW/2, y+rowH/2+2, {align:'center'}); }
      else { doc.setTextColor(...C_BODY); doc.text('미상', tX+i*colW+colW/2, y+rowH/2+2, {align:'center'}); }
    });
    y += rowH;
    // Branches
    pKeys.forEach((k,i) => {
      const p = sajuResult[k];
      doc.rect(tX+i*colW, y, colW, rowH, 'FD');
      if (p) { doc.setTextColor(...(C_OHAENG_PDF[p.branch_ohaeng]||C_BODY)); doc.text(p.branch+'('+p.branch_kr+')', tX+i*colW+colW/2, y+rowH/2+2, {align:'center'}); }
      else { doc.setTextColor(...C_BODY); doc.text('미상', tX+i*colW+colW/2, y+rowH/2+2, {align:'center'}); }
    });
    y += rowH + 12;
    // Ohaeng bars
    const oa = sajuResult.ohaeng_analysis;
    doc.setFont('NanumGothic','bold'); doc.setFontSize(12); doc.setTextColor(...C_TITLE);
    doc.text('오행 분포', PW/2, y, {align:'center'}); y += 12;
    const maxCnt = Math.max(...Object.values(oa.count), 1);
    [['木(목)','木'],['火(화)','火'],['土(토)','土'],['金(금)','金'],['水(수)','水']].forEach(([nm,k]) => {
      const cnt = oa.count[k];
      const barW = Math.max((cnt/maxCnt)*65, 2);
      doc.setFont('NanumGothic','normal'); doc.setFontSize(10); doc.setTextColor(...C_BODY);
      doc.text(nm, 73, y, {align:'right'});
      doc.setFillColor(...C_OHAENG_PDF[k]); doc.rect(78, y-4, barW > 0 ? barW : 2, 5, 'F');
      doc.setFont('NanumGothic','bold'); doc.setTextColor(...C_OHAENG_PDF[k]);
      doc.text(String(cnt), 78+barW+3, y); y += 8;
    });
    y += 8;
    doc.setFont('NanumGothic','normal'); doc.setFontSize(10); doc.setTextColor(...C_BODY);
    const yg = oa.yongsin;
    doc.text(`일간: ${oa.ilgan}(${oa.ilgan_kr}) ${oa.ilgan_ohaeng}(${oa.ilgan_ohaeng_kr})  |  강약: ${yg.strength_desc}`, PW/2, y, {align:'center'}); y+=8;
    doc.text(`용신: ${yg.yongsin}(${yg.yongsin_kr})  |  희신: ${yg.huisin||''}(${yg.huisin_kr||''})`, PW/2, y, {align:'center'}); y+=8;
    doc.text(`부족 오행: ${yg.missing_ohaeng.map((m,i)=>m+'('+yg.missing_ohaeng_kr[i]+')').join(', ')}`, PW/2, y, {align:'center'});
  }

  // Name card page
  function addNameCard(nameInfo) {
    let y = addBodyPage() + 10;
    doc.setFont('NanumGothic','bold'); doc.setFontSize(22); doc.setTextColor(...C_TITLE);
    doc.text(nameInfo.hangul, PW/2, y, {align:'center'}); y += 14;
    doc.setFont('NanumGothic','normal'); doc.setFontSize(12); doc.setTextColor(...C_SUBTITLE);
    doc.text(nameInfo.chars.map(c=>c.hanja).join(' '), PW/2, y, {align:'center'}); y += 10;
    doc.setDrawColor(180,160,130); doc.setLineWidth(0.4); doc.line(60,y,150,y); y += 10;
    // Info rows
    const infoItems = [];
    if (nameInfo.ohaeng_composition) infoItems.push(['오행 구성', nameInfo.ohaeng_composition]);
    if (nameInfo.eumryeong_flow) infoItems.push(['음령 오행', nameInfo.eumryeong_flow]);
    if (nameInfo.jawon_flow) infoItems.push(['자원 오행', nameInfo.jawon_flow]);
    infoItems.forEach(([label, value]) => {
      doc.setFont('NanumGothic','normal'); doc.setFontSize(10); doc.setTextColor(...C_SUBTITLE);
      doc.text(label, 78, y, {align:'right'});
      doc.setFont('NanumGothic','bold'); doc.setTextColor(...C_BODY);
      doc.text(String(value), 86, y); y += 8;
    });
    y += 6;
    doc.setDrawColor(210,200,185); doc.setLineWidth(0.2); doc.line(BODY_LEFT,y,PW-BODY_RIGHT,y); y += 8;
    // Char details
    nameInfo.chars.forEach(c => {
      doc.setFont('NanumGothic','bold'); doc.setFontSize(14); doc.setTextColor(...C_TITLE);
      doc.text(c.hanja, BODY_LEFT+12, y);
      doc.setFont('NanumGothic','normal'); doc.setFontSize(10); doc.setTextColor(...C_BODY);
      doc.text(`${c.hangul}  |  ${c.meaning}  |  ${c.strokes}획  |  ${c.ohaeng}`, BODY_LEFT+28, y); y += 12;
    });
    // Suri
    const suri = nameInfo.suri;
    if (suri) {
      y += 6; doc.line(BODY_LEFT,y,PW-BODY_RIGHT,y); y += 8;
      doc.setFont('NanumGothic','bold'); doc.setFontSize(11); doc.setTextColor(...C_TITLE);
      doc.text('수리오행', PW/2, y, {align:'center'}); y += 10;
      doc.setFont('NanumGothic','normal'); doc.setFontSize(9.5); doc.setTextColor(...C_BODY);
      [['원격',suri.won],['형격',suri.hyeong],['이격',suri.yi],['정격',suri.jeong]].forEach(([l,s]) => {
        doc.text(`${l}: ${s.value} → ${s.ohaeng} (${s.rating[0]})`, PW/2, y, {align:'center'}); y += 7;
      });
      doc.setFont('NanumGothic','bold'); doc.setFontSize(10);
      doc.text(`수리종합: ${suri.grade}`, PW/2, y, {align:'center'});
    }
  }

  // Build report
  const sections = report.sections || [];
  let chapterIdx = 1;
  sections.forEach(sec => {
    if (sec.type === 'intro') {
      addBgPage('chapter01');
      addSajuInfo();
      writeProse(sec.content);
    } else if (sec.type === 'name_analysis') {
      chapterIdx++;
      addBgPage('chapter0' + Math.min(chapterIdx, 5));
      const ni = names.find(n => n.hangul === (sec.name_info||{}).hangul) || names[chapterIdx-2];
      if (ni) addNameCard(ni);
      writeProse(sec.content);
    } else if (sec.type === 'comparison') {
      addBgPage('chapter05');
      writeProse(sec.content);
    }
  });

  // Back cover
  addBgPage('back_cover');

  return doc;
}

<script type="text/babel">

      fetch('data/bulyong.json').then(r => r.json())
    ]).then(([hanja, bulyong]) => {

  const saveApiKey = () => {
    localStorage.setItem('naming_api_key', apiKey);
    setStep(1);
  };

  const handleGenerate = async () => {
    setError('');
    if (!formData.surname) { setError('성씨를 입력해주세요'); return; }
    if (!formData.birth_date) { setError('생년월일을 입력해주세요'); return; }

    setStep(2); setProgress(10); setProgressMsg('사주 계산 중...');

    try {
      const [y, m, d] = formData.birth_date.split('-').map(Number);
      const bh = formData.birth_time && formData.birth_time !== '미상' ? parseInt(formData.birth_time.split(':')[0]) : null;
      const bm = formData.birth_time && formData.birth_time !== '미상' && formData.birth_time.includes(':') ? parseInt(formData.birth_time.split(':')[1]) : 0;

      const saju = calculateSaju(y, m, d, bh, bm);
      setSajuResult(saju);
      setProgress(30); setProgressMsg('이름 후보 생성 중...');

      await new Promise(r => setTimeout(r, 100)); // UI update

      const prefs = { birth_year: y, request_type: formData.request_type, name_length: formData.name_length };
      const generated = generateNames(formData.surname, formData.gender, saju, prefs, 3);
      setNames(generated);
      setProgress(100); setProgressMsg('완료!');
      setTimeout(() => setStep(3), 500);
    } catch (e) {
      setError('생성 오류: ' + e.message);
      setStep(1);
    }
  };

  const handleReport = async () => {
    if (!apiKey) { setError('API 키를 설정해주세요'); setStep(0); return; }
    setStep(4); setProgress(0); setProgressMsg('보고서 생성 시작...');
    setError('');
    try {
      const rep = await generateFullReport(apiKey, sajuResult, names, formData, (p, msg) => {
        setProgress(p); setProgressMsg(msg);
      });
      setReport(rep);
      setStep(5);
    } catch (e) {
      setError('보고서 생성 오류: ' + e.message);
      setStep(3);
    }
  };

  const handlePDF = async () => {
    setProgressMsg('PDF 생성 중... (폰트 로딩 포함 30초 소요)');
    setProgress(50);
    try {
      const doc = await generatePDF(sajuResult, names, report, formData);
      const filename = `바른이름연구소_${formData.surname}_작명보고서.pdf`;
      doc.save(filename);
      setProgressMsg('PDF 다운로드 완료!');
    } catch (e) {
      setError('PDF 생성 오류: ' + e.message);
    }
  };

  const ohaengColor = (oh) => {

    return map[oh] || '';
  };

  // Step indicators
  const stepLabels = ['설정','입력','생성','결과','보고서','완료'];

  if (!dataLoaded && !error) {
    return <div className="container" style={{textAlign:'center',paddingTop:'4rem'}}>
      <div className="loading-spinner"></div>
      <p>한자 데이터 로딩 중...</p>
    </div>;
  }

  return (
    <div>
      <div className="header">
        <h1>바른이름연구소</h1>
        <p>AI 사주 기반 작명 서비스</p>
      </div>
      <div className="container">
        <div className="step-indicator">
          {stepLabels.map((l, i) => (
            <div key={i} className={`step-dot ${i===step?'active':''} ${i<step?'completed':''}`}>{i+1}</div>
          ))}
        </div>

        {error && <div className="error-msg">{error}</div>}

        {/* Step 0: Settings */}
        {step === 0 && (
          <div className="form-card">
            <h2>API 설정</h2>
            <div className="form-group">
              <label>OpenAI API Key</label>
              <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
                placeholder="sk-..." />
              <small style={{color:'var(--text-light)',fontSize:'.8rem'}}>
                보고서 생성에 필요합니다. 키는 브라우저에만 저장됩니다.
              </small>
            </div>
            <button className="btn btn-primary" onClick={saveApiKey}>
              {apiKey ? '설정 완료 → 다음' : 'API 키 없이 진행 (이름 생성만)'}
            </button>
          </div>
        )}

        {/* Step 1: Input Form */}
        {step === 1 && (
          <div className="form-card">
            <h2>작명 정보 입력</h2>
            <div className="form-row">
              <div className="form-group">
                <label>성씨</label>
                <input value={formData.surname} onChange={e => setFormData({...formData, surname: e.target.value})}
                  placeholder="예: 김" maxLength={2} />
              </div>
              <div className="form-group">
                <label>성별</label>
                <select value={formData.gender} onChange={e => setFormData({...formData, gender: e.target.value})}>
                  <option value="남">남</option>
                  <option value="여">여</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>생년월일 (양력)</label>
                <input type="date" value={formData.birth_date} onChange={e => setFormData({...formData, birth_date: e.target.value})} />
              </div>
              <div className="form-group">
                <label>출생시간 (선택)</label>
                <input type="time" value={formData.birth_time} onChange={e => setFormData({...formData, birth_time: e.target.value})} />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>신청 유형</label>
                <select value={formData.request_type} onChange={e => setFormData({...formData, request_type: e.target.value})}>
                  <option value="신생아 작명">신생아 작명</option>
                  <option value="개명">개명</option>
                </select>
              </div>
              <div className="form-group">
                <label>이름 글자 수</label>
                <select value={formData.name_length} onChange={e => setFormData({...formData, name_length: e.target.value})}>
                  <option value="2">2글자 (외자 이름 X)</option>
                  <option value="1">1글자 (외자 이름)</option>
                </select>
              </div>
            </div>
            {formData.request_type === '개명' && (
              <div className="form-group">
                <label>현재 이름</label>
                <input value={formData.current_name} onChange={e => setFormData({...formData, current_name: e.target.value})} placeholder="현재 사용 중인 이름" />
              </div>
            )}
            <div className="form-group">
              <label>원하는 이미지/느낌 (선택)</label>
              <input value={formData.desired_image} onChange={e => setFormData({...formData, desired_image: e.target.value})} placeholder="예: 밝고 지적인, 강인한" />
            </div>
            <div className="form-group">
              <label>피하고 싶은 느낌 (선택)</label>
              <input value={formData.avoid_feeling} onChange={e => setFormData({...formData, avoid_feeling: e.target.value})} placeholder="예: 너무 흔한, 어려운 한자" />
            </div>
            <button className="btn btn-primary" onClick={handleGenerate}>이름 생성하기</button>
          </div>
        )}

        {/* Step 2: Generating */}
        {step === 2 && (
          <div className="progress-container">
            <div className="loading-spinner"></div>
            <h3>이름을 생성하고 있습니다</h3>
            <div className="progress-bar-wrap">
              <div className="progress-bar-fill" style={{width: progress+'%'}}></div>
            </div>
            <p className="progress-text">{progressMsg}</p>
          </div>
        )}

        {/* Step 3: Results */}
        {step === 3 && sajuResult && (
          <div>
            <button className="back-btn" onClick={() => setStep(1)}>← 다시 입력</button>
            <div className="form-card">
              <h2>사주 분석 결과</h2>
              <table className="saju-table">
                <thead><tr><th>시주</th><th>일주</th><th>월주</th><th>년주</th></tr></thead>
                <tbody>
                  <tr>
                    {['hour_pillar','day_pillar','month_pillar','year_pillar'].map(k => (
                      <td key={k+'s'}>{sajuResult[k] ? sajuResult[k].stem+'('+sajuResult[k].stem_kr+')' : '미상'}</td>
                    ))}
                  </tr>
                  <tr>
                    {['hour_pillar','day_pillar','month_pillar','year_pillar'].map(k => (
                      <td key={k+'b'}>{sajuResult[k] ? sajuResult[k].branch+'('+sajuResult[k].branch_kr+')' : '미상'}</td>
                    ))}
                  </tr>
                </tbody>
              </table>
              <div className="info-grid">
                <span className="label">일간</span>
                <span>{sajuResult.ohaeng_analysis.ilgan}({sajuResult.ohaeng_analysis.ilgan_kr}) - {sajuResult.ohaeng_analysis.ilgan_ohaeng}({sajuResult.ohaeng_analysis.ilgan_ohaeng_kr})</span>
                <span className="label">강약</span>
                <span>{sajuResult.ohaeng_analysis.yongsin.strength_desc}</span>
                <span className="label">용신</span>
                <span>{sajuResult.ohaeng_analysis.yongsin.yongsin}({sajuResult.ohaeng_analysis.yongsin.yongsin_kr})</span>
                <span className="label">부족 오행</span>
                <span>{sajuResult.ohaeng_analysis.yongsin.missing_ohaeng.map((m,i) => (
                  <span key={m} className={`ohaeng-badge ${ohaengColor(m)}`}>{m}({sajuResult.ohaeng_analysis.yongsin.missing_ohaeng_kr[i]})</span>
                ))}</span>
              </div>
              <div style={{margin:'1rem 0'}}>
                <strong>오행 분포: </strong>
                {OHAENG_LIST.map(oh => (
                  <span key={oh} className={`ohaeng-badge ${ohaengColor(oh)}`}>
                    {oh}({OHAENG_KR[oh]}) {sajuResult.ohaeng_analysis.count[oh]}
                  </span>
                ))}
              </div>
            </div>

            <h2 style={{fontFamily:"'Noto Serif KR',serif", color:'var(--primary)', marginBottom:'1rem'}}>추천 이름</h2>
            {names.map((name, i) => (
              <div key={i} className="name-card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div className="name-hangul">{name.hangul}</div>
                    <div className="name-hanja">{name.chars.map(c => c.hanja+'('+c.hangul+')').join(' ')}</div>
                  </div>
                  <div className="name-score">종합 {Math.round(name.total_score)}점</div>
                </div>
                <div style={{marginTop:'.8rem',fontSize:'.85rem',color:'var(--text-light)'}}>
                  {name.meaning_summary}
                </div>
                <div style={{marginTop:'.5rem'}}>
                  {name.chars.map(c => (
                    <span key={c.hanja} className={`ohaeng-badge ${ohaengColor(c.ohaeng)}`}>{c.ohaeng}({OHAENG_KR[c.ohaeng]})</span>
                  ))}
                  <span style={{fontSize:'.8rem',marginLeft:'.5rem',color:'var(--text-light)'}}>
                    수리: {name.suri.grade} | 음령: {name.eumryeong_flow} | 자원: {name.jawon_flow}
                  </span>
                </div>
                {name.chung_warnings.length > 0 && (
                  <div style={{color:'var(--error)',fontSize:'.8rem',marginTop:'.3rem'}}>
                    충: {name.chung_warnings.join(', ')}
                  </div>
                )}
              </div>
            ))}

            <div style={{marginTop:'1.5rem',display:'flex',gap:'1rem'}}>
              <button className="btn btn-primary" onClick={handleReport} style={{flex:1}}>
                보고서 생성하기 (GPT-4o)
              </button>
              <button className="btn btn-outline" onClick={() => { setNames([]); handleGenerate(); }} style={{flex:0,whiteSpace:'nowrap'}}>
                다시 생성
              </button>
            </div>
          </div>
        )}

        {/* Step 4: Report generating */}
        {step === 4 && (
          <div className="progress-container">
            <div className="loading-spinner"></div>
            <h3>보고서를 생성하고 있습니다</h3>
            <p style={{color:'var(--text-light)',marginBottom:'1rem'}}>GPT-4o로 5단계 분석을 수행합니다 (약 2~3분)</p>
            <div className="progress-bar-wrap">
              <div className="progress-bar-fill" style={{width: progress+'%'}}></div>
            </div>
            <p className="progress-text">{progressMsg} ({progress}%)</p>
          </div>
        )}

        {/* Step 5: Report view */}
        {step === 5 && report && (
          <div>
            <button className="back-btn" onClick={() => setStep(3)}>← 결과로 돌아가기</button>
            {report.sections.map((sec, i) => (
              <div key={i} className="report-section">
                <h3>{sec.title}</h3>
                {sec.type === 'name_analysis' && sec.name_info && (
                  <div style={{background:'var(--bg)',padding:'1rem',borderRadius:'8px',marginBottom:'1rem'}}>
                    <strong style={{fontSize:'1.3rem',color:'var(--primary)'}}>{sec.name_info.hangul}</strong>
                    <span style={{marginLeft:'.8rem',color:'var(--text-light)'}}>{sec.name_info.hanja}</span>
                  </div>
                )}
                <div className="prose">{sec.content}</div>
              </div>
            ))}
            <button className="btn btn-primary" onClick={handlePDF} style={{marginTop:'1rem'}}>
              PDF 다운로드
            </button>
            {progressMsg && <p className="progress-text" style={{marginTop:'.5rem'}}>{progressMsg}</p>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
</body>
</html>

</body>
